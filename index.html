<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple QR Maker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
    <style>
        :root {
            --page: #f4f4f4;
            --surface: #ffffff;
            --surface-soft: #eeeeee;
            --ink: #111111;
            --muted: #5f5f5f;
            --line: #d7d7d7;
            --line-strong: #111111;
            --shadow: 0 12px 32px rgba(0, 0, 0, 0.06);
            --focus: 0 0 0 3px rgba(0, 0, 0, 0.16);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--page);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--line);
            background: var(--surface);
        }

        header h1 {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 1.35rem;
            font-weight: 650;
            letter-spacing: 0;
            color: var(--ink);
        }

        header h1 i,
        .section-title i,
        .preview-section h2 i { color: var(--ink); }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.55rem;
            min-height: 44px;
            border: 1px solid var(--line-strong);
            border-radius: 8px;
            padding: 0.75rem 1.2rem;
            background: var(--ink);
            color: #fff;
            font-weight: 650;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        .download-btn:hover {
            background: #333;
            border-color: #333;
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
        }

        .download-btn:focus-visible,
        .shape-option:focus-visible,
        input:focus-visible,
        select:focus-visible,
        .file-upload-label:focus-visible,
        .toggle:focus-visible {
            outline: none;
            box-shadow: var(--focus);
        }

        .container {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: minmax(320px, 0.95fr) minmax(420px, 1.15fr);
            gap: 1.5rem;
            width: min(1280px, 100%);
            margin: 0 auto;
            padding: 2rem;
        }

        .preview-section,
        .controls-section {
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            align-self: start;
            padding: 2rem;
        }

        .preview-section h2 {
            margin-bottom: 1.5rem;
            font-size: 1rem;
            font-weight: 650;
            color: var(--muted);
        }

        #qr-container {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 18px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
        }

        .controls-section {
            max-height: calc(100vh - 6.5rem);
            overflow-y: auto;
            padding: 1.25rem;
        }

        .controls-section::-webkit-scrollbar { width: 8px; }
        .controls-section::-webkit-scrollbar-thumb { background: #b8b8b8; border-radius: 8px; }

        .section {
            padding: 1.1rem 0;
            border-bottom: 1px solid var(--line);
        }

        .section:first-child { padding-top: 0; }
        .section:last-of-type { border-bottom: 0; padding-bottom: 0; }

        .section-title {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            margin-bottom: 0.85rem;
            color: var(--ink);
            font-size: 0.78rem;
            font-weight: 750;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .shape-grid { display: grid; grid-template-columns: repeat(9, minmax(0, 1fr)); gap: 0.55rem; }

        .shape-option {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1;
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 0.45rem;
            background: var(--surface);
            color: var(--muted);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
        }

        .shape-option:hover {
            background: var(--surface-soft);
            border-color: #9a9a9a;
            transform: translateY(-1px);
        }

        .shape-option.selected {
            background: var(--ink);
            border-color: var(--ink);
            color: #fff;
        }

        .shape-option svg { width: 100%; height: 100%; fill: currentColor; }

        .color-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }

        .color-picker-wrap {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            min-height: 42px;
        }

        .color-picker-wrap label,
        .toggle-label,
        .input-group label {
            color: var(--muted);
            font-size: 0.86rem;
            font-weight: 550;
        }

        .color-picker-wrap input[type="color"] {
            width: 52px;
            height: 36px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            cursor: pointer;
        }

        .toggle-wrap { display: flex; align-items: center; gap: 0.65rem; min-height: 42px; }

        .toggle {
            position: relative;
            width: 48px;
            height: 26px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--surface-soft);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .toggle.active {
            background: var(--ink);
            border-color: var(--ink);
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.18);
            transition: transform 0.2s;
        }

        .toggle.active::after { transform: translateX(22px); }

        .input-group { margin-bottom: 1rem; }
        .input-group:last-child { margin-bottom: 0; }
        .input-group label { display: block; margin-bottom: 0.45rem; }

        .input-group input[type="text"],
        .input-group select {
            width: 100%;
            min-height: 44px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 0.75rem 0.85rem;
            background: var(--surface);
            color: var(--ink);
            font-size: 0.95rem;
        }

        .input-group input::placeholder { color: #8a8a8a; }
        .input-group select option { background: var(--surface); color: var(--ink); }

        .file-upload { position: relative; }
        .file-upload input[type="file"] { display: none; }

        .file-upload-label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            min-height: 44px;
            padding: 0.75rem 0.85rem;
            border: 1px dashed #9a9a9a;
            border-radius: 8px;
            background: var(--surface);
            color: var(--muted);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }

        .file-upload-label:hover {
            border-color: var(--ink);
            background: var(--surface-soft);
            color: var(--ink);
        }

        .range-label { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; }
        .range-label span { color: var(--ink); font-weight: 700; white-space: nowrap; }

        .slider-wrap { display: flex; align-items: center; gap: 1rem; }

        .slider-wrap input[type="range"] {
            flex: 1;
            accent-color: var(--ink);
        }

        .download-section { margin-top: 1.25rem; }
        .download-section .download-btn { width: 100%; padding: 0.85rem 1rem; font-size: 0.98rem; }

        @media (max-width: 900px) {
            header { flex-wrap: wrap; padding: 1rem; }
            header h1 { font-size: 1.25rem; }
            .container { grid-template-columns: 1fr; padding: 1rem; }
            .preview-section, .controls-section { padding: 1.1rem; width: 100%; }
            .controls-section { max-height: none; }
            #qr-container { padding: 12px; }
            .shape-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
            .range-label { flex-wrap: wrap; }
        }

        @media (max-width: 560px) {
            header { align-items: flex-start; flex-direction: column; }
            header .download-btn { width: 100%; }
            .shape-grid { grid-template-columns: repeat(3, 72px); }
            .shape-option { width: 72px; }
        }
    </style>
</head>
<body>
    <header>
        <h1><i class="fas fa-qrcode"></i> Simple QR Maker</h1>
        <button class="download-btn" onclick="downloadQR()"><i class="fas fa-download"></i> Download PNG</button>
    </header>
    <div class="container">
        <div class="preview-section">
            <h2><i class="fas fa-eye"></i> Preview</h2>
            <div id="qr-container"></div>
        </div>
        <div class="controls-section">
            <div class="section">
                <div class="section-title"><i class="fas fa-shapes"></i> Body Shape</div>
                <div class="shape-grid" id="body-shapes"></div>
            </div>
            <div class="section">
                <div class="section-title"><i class="fas fa-vector-square"></i> Eye Frame Shape</div>
                <div class="shape-grid" id="frame-shapes"></div>
            </div>
            <div class="section">
                <div class="section-title"><i class="fas fa-circle"></i> Eye Ball Shape</div>
                <div class="shape-grid" id="ball-shapes"></div>
            </div>
            <div class="section">
                <div class="section-title"><i class="fas fa-palette"></i> Colors</div>
                <div class="color-row">
                    <div class="color-picker-wrap">
                        <label>QR Color</label>
                        <input type="color" id="qr-color" value="#000000">
                    </div>
                    <div class="color-picker-wrap">
                        <label>Background</label>
                        <input type="color" id="bg-color" value="#ffffff">
                    </div>
                    <div class="toggle-wrap">
                        <span class="toggle-label">Transparent BG</span>
                        <div class="toggle" id="transparent-toggle"></div>
                    </div>
                </div>
            </div>
            <div class="section">
                <div class="section-title"><i class="fas fa-cog"></i> Options</div>
                <div class="input-group">
                    <label>QR Data (URL or Text)</label>
                    <input type="text" id="qr-data" value="https://example.com" placeholder="Enter URL or text">
                </div>
                <div class="input-group file-upload">
                    <label>Center Logo</label>
                    <label class="file-upload-label" for="logo-upload">
                        <i class="fas fa-image"></i> <span id="file-name">Choose image...</span>
                    </label>
                    <input type="file" id="logo-upload" accept="image/*">
                </div>
                <div class="input-group">
                    <label>Logo Size: <span id="logo-size-val">20</span>%</label>
                    <div class="slider-wrap">
                        <input type="range" id="logo-size" min="10" max="35" value="20">
                    </div>
                </div>
                <div class="input-group">
                    <label>Error Correction</label>
                    <select id="error-correction">
                        <option value="L">L - Low (7%)</option>
                        <option value="M">M - Medium (15%)</option>
                        <option value="Q">Q - Quartile (25%)</option>
                        <option value="H" selected>H - High (30%)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label class="range-label">Output Size <span id="output-size-val">500 x 500 px</span></label>
                    <div class="slider-wrap">
                        <input type="range" id="output-size" min="150" max="1000" step="10" value="500">
                    </div>
                </div>
            </div>
            <div class="download-section">
                <button class="download-btn" onclick="downloadQR()"><i class="fas fa-download"></i> Download PNG</button>
            </div>
        </div>
    </div>
    <script>
        const bodyShapes = [
            {type:'square',svg:'<rect x="2" y="2" width="8" height="8"/><rect x="14" y="2" width="8" height="8"/><rect x="26" y="2" width="8" height="8"/><rect x="2" y="14" width="8" height="8"/><rect x="14" y="14" width="8" height="8"/><rect x="26" y="14" width="8" height="8"/><rect x="2" y="26" width="8" height="8"/><rect x="14" y="26" width="8" height="8"/><rect x="26" y="26" width="8" height="8"/>'},
            {type:'dots',svg:'<circle cx="6" cy="6" r="5"/><circle cx="18" cy="6" r="5"/><circle cx="30" cy="6" r="5"/><circle cx="6" cy="18" r="5"/><circle cx="18" cy="18" r="5"/><circle cx="30" cy="18" r="5"/><circle cx="6" cy="30" r="5"/><circle cx="18" cy="30" r="5"/><circle cx="30" cy="30" r="5"/>'},
            {type:'rounded',svg:'<rect x="2" y="2" width="8" height="8" rx="2"/><rect x="14" y="2" width="8" height="8" rx="2"/><rect x="26" y="2" width="8" height="8" rx="2"/><rect x="2" y="14" width="8" height="8" rx="2"/><rect x="14" y="14" width="8" height="8" rx="2"/><rect x="26" y="14" width="8" height="8" rx="2"/><rect x="2" y="26" width="8" height="8" rx="2"/><rect x="14" y="26" width="8" height="8" rx="2"/><rect x="26" y="26" width="8" height="8" rx="2"/>'},
            {type:'extra-rounded',svg:'<rect x="2" y="2" width="8" height="8" rx="4"/><rect x="14" y="2" width="8" height="8" rx="4"/><rect x="26" y="2" width="8" height="8" rx="4"/><rect x="2" y="14" width="8" height="8" rx="4"/><rect x="14" y="14" width="8" height="8" rx="4"/><rect x="26" y="14" width="8" height="8" rx="4"/><rect x="2" y="26" width="8" height="8" rx="4"/><rect x="14" y="26" width="8" height="8" rx="4"/><rect x="26" y="26" width="8" height="8" rx="4"/>'},
            {type:'classy',svg:'<path d="M2 2h8v8H2z M14 2l8 4-8 4z M26 2h8v8h-8z M2 14h8v8H2z M14 14h8v8h-8z M26 14h8v8h-8z M2 26h8v8H2z M14 26h8v8h-8z M26 26h8v8h-8z"/>'},
            {type:'classy-rounded',svg:'<rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="26" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="8" height="8" rx="1"/><rect x="26" y="14" width="8" height="8" rx="1"/><rect x="2" y="26" width="8" height="8" rx="1"/><rect x="14" y="26" width="8" height="8" rx="1"/><rect x="26" y="26" width="8" height="8" rx="1"/>'},
        ];
        const frameShapes = [
            {type:'square',svg:'<rect x="2" y="2" width="32" height="32" fill="none" stroke="currentColor" stroke-width="4"/>'},
            {type:'dot',svg:'<circle cx="18" cy="18" r="14" fill="none" stroke="currentColor" stroke-width="4"/>'},
            {type:'extra-rounded',svg:'<rect x="2" y="2" width="32" height="32" rx="10" fill="none" stroke="currentColor" stroke-width="4"/>'},
        ];
        const ballShapes = [
            {type:'square',svg:'<rect x="6" y="6" width="24" height="24"/>'},
            {type:'dot',svg:'<circle cx="18" cy="18" r="12"/>'},
            {type:'extra-rounded',svg:'<rect x="6" y="6" width="24" height="24" rx="8"/>'},
        ];

        let currentBody = 'square', currentFrame = 'square', currentBall = 'square';
        let logoImage = '', qrCode;

        function getPreviewSize() {
            const mobileLimit = window.matchMedia('(max-width: 900px)').matches ? 240 : 300;
            return Math.max(150, Math.min(mobileLimit, window.innerWidth - 150));
        }

        function createShapeOptions(container, shapes, type) {
            const el = document.getElementById(container);
            shapes.forEach((shape, i) => {
                const div = document.createElement('div');
                div.className = 'shape-option' + (i === 0 ? ' selected' : '');
                div.innerHTML = `<svg viewBox="0 0 36 36">${shape.svg}</svg>`;
                div.onclick = () => {
                    el.querySelectorAll('.shape-option').forEach(o => o.classList.remove('selected'));
                    div.classList.add('selected');
                    if (type === 'body') currentBody = shape.type;
                    else if (type === 'frame') currentFrame = shape.type;
                    else currentBall = shape.type;
                    updateQR();
                };
                el.appendChild(div);
            });
        }

        function updateQR() {
            const data = document.getElementById('qr-data').value || 'https://example.com';
            const qrColor = document.getElementById('qr-color').value;
            const bgColor = document.getElementById('bg-color').value;
            const transparent = document.getElementById('transparent-toggle').classList.contains('active');
            const errorLevel = document.getElementById('error-correction').value;
            const logoSize = parseInt(document.getElementById('logo-size').value) / 100;

            const options = {
                width: getPreviewSize(), height: getPreviewSize(), data,
                dotsOptions: { type: currentBody, color: qrColor },
                cornersSquareOptions: { type: currentFrame, color: qrColor },
                cornersDotOptions: { type: currentBall, color: qrColor },
                backgroundOptions: { color: transparent ? 'transparent' : bgColor },
                qrOptions: { errorCorrectionLevel: errorLevel },
                imageOptions: { crossOrigin: 'anonymous', margin: 5, imageSize: logoSize }
            };
            if (logoImage) options.image = logoImage;

            document.getElementById('qr-container').innerHTML = '';
            qrCode = new QRCodeStyling(options);
            qrCode.append(document.getElementById('qr-container'));
        }

        function downloadQR() {
            const size = parseInt(document.getElementById('output-size').value);
            const data = document.getElementById('qr-data').value || 'https://example.com';
            const qrColor = document.getElementById('qr-color').value;
            const bgColor = document.getElementById('bg-color').value;
            const transparent = document.getElementById('transparent-toggle').classList.contains('active');
            const errorLevel = document.getElementById('error-correction').value;
            const logoSize = parseInt(document.getElementById('logo-size').value) / 100;

            const options = {
                width: size, height: size, data,
                dotsOptions: { type: currentBody, color: qrColor },
                cornersSquareOptions: { type: currentFrame, color: qrColor },
                cornersDotOptions: { type: currentBall, color: qrColor },
                backgroundOptions: { color: transparent ? 'transparent' : bgColor },
                qrOptions: { errorCorrectionLevel: errorLevel },
                imageOptions: { crossOrigin: 'anonymous', margin: 5, imageSize: logoSize }
            };
            if (logoImage) options.image = logoImage;

            const downloadQR = new QRCodeStyling(options);
            downloadQR.download({ name: 'qr-code', extension: 'png' });
        }

        function updateOutputSizeLabel() {
            const size = parseInt(document.getElementById('output-size').value);
            document.getElementById('output-size-val').textContent = `${size} x ${size} px`;
        }

        // Event listeners
        document.getElementById('transparent-toggle').onclick = function() {
            this.classList.toggle('active');
            updateQR();
        };
        document.getElementById('qr-data').oninput = updateQR;
        document.getElementById('qr-color').oninput = updateQR;
        document.getElementById('bg-color').oninput = updateQR;
        document.getElementById('error-correction').onchange = updateQR;
        document.getElementById('logo-size').oninput = function() {
            document.getElementById('logo-size-val').textContent = this.value;
            updateQR();
        };
        document.getElementById('output-size').oninput = updateOutputSizeLabel;
        window.addEventListener('resize', updateQR);
        document.getElementById('logo-upload').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('file-name').textContent = file.name;
                const reader = new FileReader();
                reader.onload = (ev) => { logoImage = ev.target.result; updateQR(); };
                reader.readAsDataURL(file);
            }
        };

        // Initialize
        createShapeOptions('body-shapes', bodyShapes, 'body');
        createShapeOptions('frame-shapes', frameShapes, 'frame');
        createShapeOptions('ball-shapes', ballShapes, 'ball');
        updateOutputSizeLabel();
        updateQR();
    </script>
</body>
</html>
